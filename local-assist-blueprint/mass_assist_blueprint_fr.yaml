blueprint:
  domain: automation
  name: Music Assistant - Support de voix en mode local - Blueprint
  source_url: https://github.com/music-assistant/voice-support/blob/main/local-assist-blueprint/mass_assist_blueprint_fr.yaml
  description: " ![Image](https://github.com/music-assistant/voice-support/blob/main/assets/music-assistant.png?raw=true)

    # Lire des fichiers multimÃĐdias Ã  l'aide de commandes vocales

    ### Configuration du Blueprint

    #### Obligatoire

    * DÃĐfinissez un ÂŦ Lecteur par dÃĐfaut Âŧ Ã  utiliser lorsqu'aucune cible n'est mentionnÃĐe dans la requÃŠte
    et que la requÃŠte ne provient pas d'une zone ÃĐquipÃĐe d'un lecteur Music Assistant.

    #### Facultatif

    * Modifiez la phrase dÃĐclencheuse ou ajoutez-en d'autres ; vous pouvez ÃĐgalement l'utiliser pour traduire
    la phrase dans votre propre langue.

